steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/conexao-solidaria-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/conexao-solidaria-backend:latest'
      - '-f'
      - 'Backend/Dockerfile'
      - './Backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/conexao-solidaria-frontend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/conexao-solidaria-frontend:latest'
      - '-f'
      - 'Frontend/Dockerfile'
      - './Frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/conexao-solidaria-backend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/conexao-solidaria-frontend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=./Backend
      - --image=gcr.io/$PROJECT_ID/conexao-solidaria-backend:$SHORT_SHA
      - --location=us-central1
      - --cluster=conexao-solidaria

  - name: 'gcr.io/cloud-builders/cloud-run'
    args:
      - deploy
      - 'conexao-solidaria-frontend'
      - '--image=gcr.io/$PROJECT_ID/conexao-solidaria-frontend:$SHORT_SHA'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--set-env-vars=BACKEND_URL=https://conexao-solidaria-backend-xxxxxx.run.app'

images:
  - 'gcr.io/$PROJECT_ID/conexao-solidaria-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/conexao-solidaria-frontend:$SHORT_SHA'

substitutions:
  _REGION: 'us-central1'

options:
  machineType: 'N1_HIGHCPU_8'

timeout: '1800s'

