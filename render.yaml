services:
  - type: web
    name: conexao-solidaria-backend
    runtime: node
    plan: free
    rootDir: Backend
    startCommand: npm install && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: conexao-solidaria-frontend
    runtime: static
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

