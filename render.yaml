services:
  # ===== BACKEND SERVICE =====
  - type: web
    name: conexao-solidaria-backend
    runtime: node
    plan: free
    rootDir: Backend
    startCommand: npm install && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        sync: false
    # Link FRONTEND_URL to Frontend's external URL automatically
    # You'll need to set this manually in Render dashboard or via API

  # ===== FRONTEND SERVICE =====
  - type: web
    name: conexao-solidaria-frontend
    runtime: static
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    # Set VITE_API_URL to Backend service URL (e.g., https://conexao-solidaria-backend.onrender.com)
    # This can be set manually in Render dashboard

# === DEPLOYMENT INSTRUCTIONS ===
# 
# 1. Connect this repo to Render at https://render.com
# 2. Create two services from this render.yaml
# 3. For Backend service:
#    - Set environment variable: FRONTEND_URL = https://conexao-solidaria-frontend.onrender.com
# 4. For Frontend service:
#    - Set build environment variable: VITE_API_URL = https://conexao-solidaria-backend.onrender.com
# 5. Deploy both services
#
# Important: After deployment, update the FRONTEND_URL in Backend to match your Frontend URL
# and VITE_API_URL in Frontend to match your Backend URL
